apiVersion: wurzel.dev/v1alpha1
kind: Pipeline
metadata:
  name: pipelinedemo
spec:
  backend: dvc
  middlewares:
    - name: prometheus
    - name: secret_resolver
      settings:
        URL: "http://127.0.0.1:54321"
        SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU"  # pragma: allowlist secret
  steps:
    - name: source
      class: wurzel.steps.manual_markdown.ManualMarkdownStep
      settings:
        FOLDER_PATH: "${secret:vault:demo_folder_path}"  # pragma: allowlist secret

    - name: splitter
      class: wurzel.steps.splitter.SimpleSplitterStep
      dependsOn: [source]
      settings:
        BATCH_SIZE: "100"
        NUM_THREADS: "4"

  backendConfig:
    dvc:
      dataDir: ./data
      encapsulateEnv: true
